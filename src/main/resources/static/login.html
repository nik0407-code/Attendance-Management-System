<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
          font-family: 'DM Sans', 'Segoe UI', sans-serif;
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: #e8f5ee;
          padding: 40px 20px;
        }

        /* ── CARD ── */
        .container {
          width: 420px;
          border-radius: 18px;
          overflow: hidden;
          box-shadow:
            0 0 0 1px rgba(15,110,86,0.12),
            0 12px 40px rgba(15,110,86,0.1),
            0 2px 8px rgba(0,0,0,0.06);
          background: #fff;
          animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
          from { opacity:0; transform:translateY(20px); }
          to   { opacity:1; transform:none; }
        }

        /* ── HEADER ── */
        .header {
          background: linear-gradient(135deg, #074a30 0%, #0f6e56 60%, #1d9e75 100%);
          padding: 28px 24px 24px;
          text-align: center;
          position: relative;
          overflow: hidden;
        }

        .header::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 2px;
          background: linear-gradient(90deg, transparent, #9fe1cb, #5dcaa5, transparent);
        }

        .header::after {
          content: '';
          position: absolute;
          top: -50px; right: -50px;
          width: 180px; height: 180px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(157,225,203,0.1), transparent 70%);
          pointer-events: none;
        }

        .logo-mark {
          width: 48px; height: 48px;
          border: 1.5px solid rgba(157,225,203,0.55);
          border-radius: 12px;
          display: flex; align-items: center; justify-content: center;
          font-family: 'Cormorant Garamond', serif;
          font-size: 24px;
          color: #9fe1cb;
          background: rgba(255,255,255,0.07);
          margin: 0 auto 12px;
          position: relative; z-index: 1;
        }

        .header h1 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 28px; font-weight: 600;
          color: #e8faf4; letter-spacing: 4px;
          line-height: 1; margin-bottom: 6px;
          position: relative; z-index: 1;
        }

        .header p {
          font-size: 9px; letter-spacing: 2.5px;
          text-transform: uppercase;
          color: rgba(157,225,203,0.6);
          position: relative; z-index: 1;
        }

        /* ── FORM SECTION ── */
        .form {
          padding: 32px 28px 36px;
        }

        .form-title {
          font-family: 'Cormorant Garamond', serif;
          font-size: 22px; font-weight: 300;
          color: #0a3d28; text-align: center;
          margin-bottom: 4px;
        }

        .form-sub {
          font-size: 9px; letter-spacing: 3px;
          text-transform: uppercase; color: #0f6e56;
          text-align: center; margin-bottom: 24px;
        }

        /* ── INPUT GROUP ── */
        .input-group {
          position: relative;
          margin-bottom: 12px;
        }

        .input-group svg {
          position: absolute;
          left: 13px; top: 50%; transform: translateY(-50%);
          pointer-events: none;
          color: #7ab89a;
        }

        .input-group input,
        .input-group select {
          width: 100%;
          font-family: 'DM Sans', sans-serif;
          font-size: 13px;
          padding: 12px 14px 12px 38px;
          border: 1px solid #c8ead8;
          border-radius: 9px;
          background: #f7fdf9;
          color: #0a3d28;
          outline: none;
          transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
          appearance: none;
        }

        .input-group input::placeholder { color: #a0c4b2; }

        .input-group input:focus,
        .input-group select:focus {
          border-color: #5dcaa5;
          background: #fff;
          box-shadow: 0 0 0 3px rgba(93,202,165,0.13);
        }

        /* select arrow */
        .select-wrap::after {
          content: '';
          position: absolute;
          right: 14px; top: 50%; transform: translateY(-50%);
          width: 8px; height: 8px;
          border-right: 1.5px solid #7ab89a;
          border-bottom: 1.5px solid #7ab89a;
          transform: translateY(-65%) rotate(45deg);
          pointer-events: none;
        }

        /* ── mint divider ── */
        .mint-line {
          height: 1px;
          background: linear-gradient(90deg, transparent, #9fe1cb, transparent);
          margin: 20px 0; opacity: 0.8;
        }

        /* ── LOGIN BUTTON ── */
        .btn-login {
          width: 100%;
          font-family: 'DM Sans', sans-serif;
          font-size: 11px; font-weight: 600;
          letter-spacing: 2px; text-transform: uppercase;
          padding: 14px;
          border: none; border-radius: 9px;
          background: linear-gradient(135deg, #074a30, #0f6e56);
          color: #e8faf4;
          cursor: pointer;
          transition: transform 0.2s, box-shadow 0.2s;
          display: flex; align-items: center; justify-content: center; gap: 8px;
          margin-top: 6px;
        }

        .btn-login:hover {
          transform: scale(1.025);
          box-shadow: 0 8px 28px rgba(15,110,86,0.28);
        }

        /* ── LINK ── */
        .link {
          margin-top: 18px;
          text-align: center;
          font-size: 12px;
          color: #7ab89a;
        }

        .link a {
          color: #0f6e56;
          text-decoration: none;
          font-weight: 500;
          transition: color 0.2s;
        }

        .link a:hover { color: #1d9e75; }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo-mark">A</div>
        <h1>AMS</h1>
        <p>Attendance Management System</p>
    </div>

    <!-- FORM -->
    <div class="form">

        <div class="form-title">Welcome Back</div>
        <div class="form-sub">Sign in to continue</div>

        <!-- Name -->
        <div class="input-group">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="name" placeholder="Full Name">
        </div>

        <!-- Email -->
        <div class="input-group">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" placeholder="Email Address">
        </div>

        <!-- Password -->
        <div class="input-group">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Password">
        </div>

        <!-- Role -->
        <div class="input-group select-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
            <select id="role">
                <option value="">Select Role</option>
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
                <option value="Admin">Admin</option>
            </select>
        </div>

        <div class="mint-line"></div>

        <button class="btn-login" onclick="login()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
            </svg>
            Login
        </button>

        <div class="link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>

    </div>
</div>

<script>
    function login() {
      let name     = document.getElementById("name").value
      let email    = document.getElementById("email").value
      let password = document.getElementById("password").value
      let role     = document.getElementById("role").value

      if (email === "" || password === "" || role === "") {
        alert("Please fill all fields")
        return
      }

      fetch("http://localhost:8080/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password, role })
      })
      .then(res => res.text())
      .then(data => {
        alert(data)
        let msg = data.trim().toLowerCase()

        if (msg === "admin") {
          localStorage.setItem("role", "admin")
          localStorage.setItem("name", name)
          localStorage.setItem("email", email)
          window.location.href = "admin-dashboard.html"
        }
        else if (msg === "student") {
          localStorage.setItem("role", "student")
          localStorage.setItem("name", name)
          localStorage.setItem("email", email)
          window.location.href = "student-dashboard.html"
        }
        else if (msg === "teacher") {
          localStorage.setItem("role", "teacher")
          localStorage.setItem("name", name)
          localStorage.setItem("email", email)
          window.location.href = "teacher-dashboard.html"
        }
      })
      .catch(() => alert("Server Error"))
    }
</script>

</body>
</html>
