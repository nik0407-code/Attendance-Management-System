<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance — AMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
          font-family: 'DM Sans', sans-serif;
          min-height: 100vh;
          background: #e8f5ee;
          padding: 40px 20px;
          display: flex;
          justify-content: center;
          align-items: flex-start;
        }

        .container {
          width: 1000px;
          max-width: 100%;
          border-radius: 18px;
          overflow: hidden;
          box-shadow:
            0 0 0 1px rgba(15,110,86,0.12),
            0 12px 40px rgba(15,110,86,0.1),
            0 2px 8px rgba(0,0,0,0.06);
          background: #fff;
          animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
          from { opacity:0; transform:translateY(20px); }
          to   { opacity:1; transform:none; }
        }

        /* ── HEADER ── */
        .header {
          background: linear-gradient(135deg, #074a30 0%, #0f6e56 60%, #1d9e75 100%);
          padding: 14px 24px;
          position: relative;
          overflow: hidden;
          border-bottom: 1px solid rgba(157,225,203,0.15);
        }
        .header::before {
          content:''; position:absolute; top:0; left:0; right:0; height:2px;
          background: linear-gradient(90deg, transparent, #9fe1cb, #5dcaa5, transparent);
        }
        .header::after {
          content:''; position:absolute; top:-40px; right:-40px;
          width:160px; height:160px; border-radius:50%;
          background: radial-gradient(circle, rgba(157,225,203,0.1), transparent 70%);
          pointer-events:none;
        }
        .header-bar {
          display: flex; align-items: center; justify-content: space-between;
          position: relative; z-index: 2;
        }
        .header-brand { display:flex; align-items:center; gap:10px; }
        .logo-mark {
          width:36px; height:36px; border:1.5px solid rgba(157,225,203,0.55); border-radius:8px;
          display:flex; align-items:center; justify-content:center;
          font-family:'Cormorant Garamond',serif; font-size:18px; color:#9fe1cb; background:rgba(255,255,255,0.07);
        }
        .brand-name {
          font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600;
          color:#e8faf4; letter-spacing:3px; line-height:1;
        }
        .brand-sub { font-size:9px; color:rgba(157,225,203,0.55); letter-spacing:2.5px; text-transform:uppercase; margin-top:2px; }

        .header-title {
          font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300;
          color:#e8faf4; letter-spacing:1px;
        }

        .btn-back {
          font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600;
          letter-spacing:2px; text-transform:uppercase;
          padding:8px 18px; border-radius:6px;
          border:1.5px solid rgba(157,225,203,0.45);
          background:transparent; color:#9fe1cb;
          cursor:pointer; transition:all 0.2s;
          display:inline-flex; align-items:center; gap:6px;
        }
        .btn-back:hover {
          background:rgba(157,225,203,0.12); border-color:rgba(157,225,203,0.8); color:#e8faf4;
        }

        /* ── CONTENT ── */
        .content { padding: 28px 28px 36px; }

        .page-title {
          font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:300;
          color:#0a3d28; text-align:center; margin-bottom:4px;
        }
        .page-sub {
          font-size:9px; letter-spacing:4px; text-transform:uppercase;
          color:#0f6e56; text-align:center; margin-bottom:24px;
        }

        /* ── TOP CONTROLS ── */
        .controls-card {
          background:#f7fdf9; border:1px solid #c8ead8; border-radius:12px;
          padding:18px 20px; margin-bottom:16px;
        }

        .top-row {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr auto;
          gap: 10px;
          align-items: center;
          margin-bottom: 12px;
        }

        .time-row {
          display: flex; gap: 10px; align-items: center;
          flex-wrap: wrap;
        }

        .time-label {
          font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#7ab89a;
          white-space:nowrap;
        }

        .time-group {
          display:flex; gap:6px; align-items:center;
        }

        /* shared input/select style */
        .controls-card input,
        .controls-card select {
          font-family:'DM Sans',sans-serif; font-size:12px;
          padding:10px 12px; border:1px solid #c8ead8; border-radius:8px;
          background:#fff; color:#0a3d28; outline:none;
          transition:border-color 0.2s, box-shadow 0.2s; appearance:none;
        }
        .controls-card input:focus,
        .controls-card select:focus {
          border-color:#5dcaa5; box-shadow:0 0 0 3px rgba(93,202,165,0.12);
        }
        .controls-card input[type="time"] { width:110px; }
        .controls-card select.ampm       { width:70px; }

        /* search */
        .search-field {
          position: relative; margin-bottom: 14px;
        }
        .search-field input {
          width:100%; font-family:'DM Sans',sans-serif; font-size:13px;
          padding:11px 14px 11px 38px; border:1px solid #c8ead8; border-radius:8px;
          background:#f7fdf9; color:#0a3d28; outline:none;
          transition:border-color 0.2s, box-shadow 0.2s;
        }
        .search-field input::placeholder { color:#a0c4b2; }
        .search-field input:focus { border-color:#5dcaa5; background:#fff; box-shadow:0 0 0 3px rgba(93,202,165,0.12); }
        .search-icon {
          position:absolute; left:12px; top:50%; transform:translateY(-50%);
          color:#9fe1cb; pointer-events:none;
        }

        /* ── ACTION BUTTONS ── */
        .actions { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }

        .btn {
          font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600;
          letter-spacing:1.5px; text-transform:uppercase;
          padding:10px 20px; border-radius:8px; border:none;
          cursor:pointer; transition:0.25s;
          display:inline-flex; align-items:center; gap:6px;
        }
        .btn-primary {
          background:linear-gradient(135deg,#074a30,#0f6e56); color:#e8faf4;
        }
        .btn-primary:hover { transform:scale(1.03); box-shadow:0 6px 20px rgba(15,110,86,0.28); }

        .btn-outline {
          background:transparent; border:1px solid #c8ead8; color:#0f6e56;
        }
        .btn-outline:hover { background:#f0faf6; border-color:#9fe1cb; }

        .btn-submit {
          margin-left:auto;
          background:linear-gradient(135deg,#074a30,#0f6e56); color:#e8faf4;
        }
        .btn-submit:hover { transform:scale(1.03); box-shadow:0 6px 20px rgba(15,110,86,0.28); }

        /* ── TABLE ── */
        .mint-line { height:1px; background:linear-gradient(90deg,transparent,#9fe1cb,transparent); margin:0 0 16px; opacity:0.8; }

        .table-wrap { border:1px solid #c8ead8; border-radius:12px; overflow:hidden; }

        .table-top {
          display:flex; align-items:center; justify-content:space-between;
          padding:12px 18px; background:#edf9f3; border-bottom:1px solid #c8ead8;
        }
        .table-top strong {
          font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:400; color:#0a3d28;
        }
        .table-count { font-size:10px; color:#7ab89a; letter-spacing:1px; }

        .table-scroll { overflow-x:auto; }

        table { width:100%; border-collapse:collapse; }

        thead th {
          background:#edf9f3; color:#0f6e56;
          font-size:9px; font-weight:500; letter-spacing:2px; text-transform:uppercase;
          padding:12px 16px; text-align:left; border-bottom:1px solid #9fe1cb;
        }
        thead th:last-child { text-align:center; }

        tbody td {
          font-size:13px; color:#3a6a50;
          padding:11px 16px; border-bottom:1px solid #e4f5ec; text-align:left;
        }
        tbody td:last-child { text-align:center; }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr:hover td { background:#f2fbf7; }

        /* custom checkbox */
        input[type="checkbox"] {
          appearance:none; width:18px; height:18px; border:1.5px solid #c8ead8;
          border-radius:5px; background:#fff; cursor:pointer;
          transition:background 0.2s, border-color 0.2s;
          position:relative; display:inline-flex; align-items:center; justify-content:center;
        }
        input[type="checkbox"]:checked { background:#0f6e56; border-color:#0f6e56; }
        input[type="checkbox"]:checked::after {
          content:''; position:absolute;
          width:4px; height:8px;
          border:2px solid #fff; border-top:none; border-left:none;
          transform:rotate(45deg) translate(-1px,-1px);
        }

        /* empty state */
        .empty-state { text-align:center; padding:48px 20px; color:#7ab89a; }
        .empty-state p { font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-top:12px; }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-bar">
            <div class="header-brand">
                <div class="logo-mark">A</div>
                <div>
                    <div class="brand-name">AMS</div>
                    <div class="brand-sub">Attendance Management</div>
                </div>
            </div>
            <div class="header-title">Mark Attendance</div>
            <button class="btn-back" onclick="history.back()">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 5l-7 7 7 7"/>
                </svg>
                Back
            </button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="page-title">Mark Attendance</div>
        <div class="page-sub">Admin Panel</div>

        <!-- CONTROLS CARD -->
        <div class="controls-card">
            <div class="top-row">
                <select id="teacherSelect">
                    <option value="">Select Teacher</option>
                </select>
                <select id="subjectSelect">
                    <option value="">Select Subject</option>
                </select>
                <input type="date" id="date">
                <!-- placeholder to keep grid aligned on wide screens -->
                <div></div>
            </div>

            <div class="time-row">
                <span class="time-label">From</span>
                <div class="time-group">
                    <input type="time" id="fromTime">
                    <select class="ampm" id="fromAmPm">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
                <span class="time-label" style="margin-left:8px;">To</span>
                <div class="time-group">
                    <input type="time" id="toTime">
                    <select class="ampm" id="toAmPm">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-field">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="search" placeholder="Search by name or roll number" onkeyup="searchStudent()">
        </div>

        <!-- ACTIONS -->
        <div class="actions">
            <button class="btn btn-outline" onclick="selectAll()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                Select All
            </button>
            <button class="btn btn-outline" onclick="deselectAll()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
                Deselect All
            </button>
            <button class="btn btn-submit btn-primary" onclick="submitAttendance()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                Submit Attendance
            </button>
        </div>

        <div class="mint-line"></div>

        <!-- TABLE -->
        <div class="table-wrap">
            <div class="table-top">
                <strong>Students</strong>
                <span class="table-count" id="tableCount">— students</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Present</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    let students = []
    let filteredStudents = []
    let selectedStudents = new Set()

    /* ── LOAD TEACHERS ── */
    fetch("http://localhost:8080/getTeachers")
      .then(res => res.json())
      .then(data => {
        let t = document.getElementById("teacherSelect")
        t.innerHTML = "<option value=''>Select Teacher</option>"
        data.forEach(e => {
          let op = document.createElement("option")
          op.value = e.email
          op.text  = e.name
          t.appendChild(op)
        })
      })

    /* ── AUTO SUBJECT ── */
    document.getElementById("teacherSelect").addEventListener("change", function(){
      let email = this.value
      fetch("http://localhost:8080/getAssignedSubjects")
        .then(res => res.json())
        .then(data => {
          let s = document.getElementById("subjectSelect")
          s.innerHTML = ""
          data.forEach(e => {
            if(e.teacherEmail === email){
              let op = document.createElement("option")
              op.value = e.subjectName
              op.text  = e.subjectName
              s.appendChild(op)
            }
          })
          if(s.innerHTML === "") s.innerHTML = "<option>No Subject</option>"
        })
    })

    /* ── LOAD STUDENTS ── */
    function loadStudents(){
      fetch("http://localhost:8080/getUsers")
        .then(res => res.json())
        .then(data => {
          students = data.filter(u => u.role.toLowerCase() === "student")
          students.sort((a,b) => a.rollno - b.rollno)
          filteredStudents = [...students]
          renderTable(filteredStudents)
        })
    }

    /* ── RENDER TABLE ── */
    function renderTable(data){
      let tbody = document.getElementById("tableBody")
      document.getElementById("tableCount").innerText = data.length + " student" + (data.length !== 1 ? "s" : "")

      if(data.length === 0){
        tbody.innerHTML = `<tr><td colspan="3" style="padding:0;border:none;">
          <div class="empty-state">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9fe1cb" stroke-width="1.5">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
            <p>No students found</p>
          </div>
        </td></tr>`
        return
      }

      tbody.innerHTML = ""
      data.forEach(s => {
        let row = tbody.insertRow()
        row.insertCell(0).innerText = s.rollno
        row.insertCell(1).innerText = s.name

        let cb = document.createElement("input")
        cb.type    = "checkbox"
        cb.checked = selectedStudents.has(s.rollno)
        cb.onchange = () => {
          cb.checked ? selectedStudents.add(s.rollno) : selectedStudents.delete(s.rollno)
        }
        row.insertCell(2).appendChild(cb)
      })
    }

    /* ── SEARCH ── */
    function searchStudent(){
      let val = document.getElementById("search").value.toLowerCase()
      filteredStudents = students.filter(s =>
        s.name.toLowerCase().includes(val) || s.rollno.toString().includes(val)
      )
      renderTable(filteredStudents)
    }

    /* ── SELECT / DESELECT ALL ── */
    function selectAll(){
      filteredStudents.forEach(s => selectedStudents.add(s.rollno))
      renderTable(filteredStudents)
    }

    function deselectAll(){
      filteredStudents.forEach(s => selectedStudents.delete(s.rollno))
      renderTable(filteredStudents)
    }

    /* ── SUBMIT ── */
    function submitAttendance(){
      let teacher = document.getElementById("teacherSelect").value
      let subject = document.getElementById("subjectSelect").value
      let date    = document.getElementById("date").value
      let fromTime  = document.getElementById("fromTime").value
      let fromAmPm  = document.getElementById("fromAmPm").value
      let toTime    = document.getElementById("toTime").value
      let toAmPm    = document.getElementById("toAmPm").value

      if(!teacher || subject === "No Subject" || !date || !fromTime || !toTime){
        alert("Please fill all fields"); return
      }

      let time = fromTime + " " + fromAmPm + " - " + toTime + " " + toAmPm

      fetch("http://localhost:8080/markAttendance",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          teacherEmail: teacher,
          subjectName:  subject,
          date, time,
          students: Array.from(selectedStudents)
        })
      })
      .then(res => res.text())
      .then(data => {
        alert(data)
        selectedStudents.clear()
        document.getElementById("teacherSelect").value = ""
        document.getElementById("subjectSelect").innerHTML = "<option>Select Subject</option>"
        document.getElementById("date").value     = ""
        document.getElementById("fromTime").value = ""
        document.getElementById("toTime").value   = ""
        document.getElementById("fromAmPm").value = "AM"
        document.getElementById("toAmPm").value   = "AM"
        document.getElementById("search").value   = ""
        filteredStudents = [...students]
        renderTable(filteredStudents)
      })
    }

    loadStudents()
</script>
</body>
</html>
