<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard — AMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --mint:#e8f5ef; --forest:#074a30; --forest2:#0f6e56; --forest3:#1d9e75;
      --teal:#2a9d7f; --teal-l:#52b788; --teal-pale:#d8f3dc; --teal-mid:#9fe1cb;
      --white:#fff; --text:#0a3d28; --muted:#7ab89a; --border:#c8ead8;
      --red:#a32d2d; --red-pale:#fdecea;
      --shadow:0 0 0 1px rgba(15,110,86,0.12),0 12px 40px rgba(15,110,86,0.10),0 2px 8px rgba(0,0,0,0.06);
      --r:18px;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans',sans-serif;}
    body{
      min-height:100vh;background:var(--mint);
      display:flex;justify-content:center;align-items:center;padding:32px 20px;
    }

    .card{
      width:100%;max-width:820px;border-radius:var(--r);overflow:hidden;
      box-shadow:var(--shadow);background:var(--white);
      animation:fadeUp .45s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}

    /* ── HEADER ── */
    .hdr{
      background:linear-gradient(135deg,var(--forest) 0%,var(--forest2) 60%,var(--forest3) 100%);
      padding:22px 28px;display:flex;align-items:center;gap:16px;
      position:relative;overflow:hidden;
    }
    .hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--teal-mid),#5dcaa5,transparent);}
    .hdr::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(157,225,203,0.12),transparent 70%);pointer-events:none;}

    .logo-mark{width:44px;height:44px;border:1.5px solid rgba(157,225,203,0.55);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--teal-mid);background:rgba(255,255,255,0.08);flex-shrink:0;position:relative;z-index:1;}
    .hdr-info{position:relative;z-index:1;}
    .hdr-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#e8faf4;letter-spacing:4px;}
    .hdr-sub{font-size:10px;color:rgba(157,225,203,0.6);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}

    .user-pill{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.12);border:1px solid rgba(157,225,203,0.3);border-radius:30px;padding:7px 16px 7px 7px;margin-left:auto;position:relative;z-index:1;}
    .user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal-mid),#5dcaa5);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--forest);flex-shrink:0;}
    .user-name{font-size:13px;font-weight:500;color:#e8faf4;line-height:1.2;}
    .user-roll{font-size:10px;color:rgba(157,225,203,0.7);}

    .logout-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.4);color:#e8faf4;padding:8px 18px;border-radius:8px;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;position:relative;z-index:1;flex-shrink:0;}
    .logout-btn:hover{background:rgba(255,255,255,0.14);}

    /* ── BODY ── */
    .body{padding:40px 32px 44px;text-align:center;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;color:var(--text);margin-bottom:4px;}
    .page-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:36px;}

    /* ── STAT CARDS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:36px;}
    .stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:20px 16px 18px;text-align:left;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(15,110,86,0.1);}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--teal-l));}
    .stat-card.absent::before{background:linear-gradient(90deg,#c0392b,#e74c3c);}
    .stat-number{font-size:32px;font-weight:600;color:var(--text);line-height:1;margin-bottom:6px;}
    .stat-card.absent .stat-number{color:var(--red);}
    .stat-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
    .stat-ring{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;}
    .stat-card.absent .stat-ring{border-color:rgba(163,45,45,0.2);}

    .mint-line{height:1px;background:linear-gradient(90deg,transparent,var(--teal-mid),transparent);margin:0 0 32px;opacity:.7;}

    /* ── ACTION CARDS ── */
    .action-grid{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
    .action-card{
      background:var(--white);border:1.5px solid var(--border);border-radius:14px;
      padding:22px 20px 18px;text-align:left;cursor:pointer;width:200px;
      transition:transform .2s,box-shadow .2s,border-color .2s;
      position:relative;overflow:hidden;
    }
    .action-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--teal-l));opacity:0;transition:opacity .22s;}
    .action-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(15,110,86,0.13);border-color:var(--teal-mid);}
    .action-card:hover::before{opacity:1;}
    .action-icon-box{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--forest),var(--forest2));display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
    .action-icon-box svg{color:#e8faf4;}
    .action-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
    .action-desc{font-size:11px;color:var(--muted);letter-spacing:.3px;}

    /* ── MODAL OVERLAY ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(7,74,48,0.38);backdrop-filter:blur(5px);z-index:100;justify-content:center;align-items:center;padding:20px;}
    .modal-overlay.open{display:flex;}

    .modal{background:var(--white);border-radius:16px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 24px 64px rgba(7,74,48,0.28);animation:modalIn .28s ease both;}
    @keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:none;}}

    .modal-hdr{background:linear-gradient(135deg,var(--forest),var(--forest2));padding:22px 24px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
    .modal-hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal-mid),transparent);}
    .modal-hdr::after{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(157,225,203,0.10),transparent 70%);pointer-events:none;}

    .modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:#e8faf4;}
    .modal-sub{font-size:10px;color:rgba(157,225,203,0.6);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
    .modal-close{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#e8faf4;width:32px;height:32px;border-radius:7px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;position:relative;z-index:1;}
    .modal-close:hover{background:rgba(255,255,255,0.22);}

    .modal-body{padding:28px 24px 24px;}

    /* ── FIELD SELECTOR TABS ── */
    .field-selector{display:flex;gap:8px;margin-bottom:24px;background:var(--mint);border-radius:10px;padding:5px;}
    .field-tab{
      flex:1;padding:9px 12px;border:none;border-radius:7px;
      background:transparent;color:var(--muted);font-size:12px;font-weight:600;
      letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
      transition:all .2s;font-family:'DM Sans',sans-serif;
      display:flex;align-items:center;justify-content:center;gap:7px;
    }
    .field-tab.active{background:var(--white);color:var(--forest);box-shadow:0 1px 6px rgba(15,110,86,0.13);}
    .field-tab:hover:not(.active){color:var(--teal);}
    .field-tab svg{opacity:.7;}
    .field-tab.active svg{opacity:1;}

    /* ── FIELD PANELS ── */
    .field-panel{display:none;}
    .field-panel.active{display:block;}

    .field{margin-bottom:16px;text-align:left;}
    .field-label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
    .field-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);background:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;font-family:'DM Sans',sans-serif;}
    .field-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(42,157,127,0.12);}
    .field-input:read-only{background:#f7faf9;color:var(--muted);cursor:default;}
    .field-hint{font-size:11px;color:var(--muted);margin-top:5px;}

    /* current-value chip */
    .current-chip{display:inline-flex;align-items:center;gap:5px;background:var(--teal-pale);color:var(--forest2);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:14px;letter-spacing:.3px;}
    .current-chip svg{flex-shrink:0;}

    .modal-actions{display:flex;gap:10px;margin-top:6px;}
    .btn-save{flex:1;padding:12px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--forest),var(--forest2));color:#e8faf4;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:'DM Sans',sans-serif;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:7px;}
    .btn-save:hover{opacity:.88;}
    .btn-save:disabled{opacity:.55;cursor:not-allowed;}
    .btn-cancel{padding:12px 20px;border:1.5px solid var(--border);border-radius:9px;background:var(--white);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;font-family:'DM Sans',sans-serif;}
    .btn-cancel:hover{border-color:var(--teal);color:var(--teal);}

    .modal-msg{margin-top:14px;text-align:center;font-size:13px;padding:10px 14px;border-radius:8px;display:none;}
    .modal-msg.success{color:#1a6b3c;background:var(--teal-pale);display:block;}
    .modal-msg.error{color:var(--red);background:var(--red-pale);display:block;}

    /* spinner */
    .spinner{width:15px;height:15px;border:2px solid rgba(232,250,244,0.4);border-top-color:#e8faf4;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── ACCESS DENIED STATE ── */
    .access-denied{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;}
    .access-denied.show{display:flex;}
    .access-icon{width:56px;height:56px;border-radius:14px;background:var(--red-pale);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
    .access-icon svg{color:var(--red);}
    .access-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--red);margin-bottom:8px;}
    .access-sub{font-size:13px;color:var(--muted);}

    @media(max-width:600px){
      .stats-grid{grid-template-columns:repeat(2,1fr);}
      .user-pill{display:none;}
      .action-card{width:160px;}
      .field-tab span{display:none;}
    }
  </style>
</head>
<body>

<!-- ── EDIT PROFILE MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title">Edit Profile</div>
        <div class="modal-sub" id="modalSubtitle">Choose what to update</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">

      <!-- FIELD SELECTOR TABS -->
      <div class="field-selector">
        <button class="field-tab active" id="tabEmail" onclick="switchTab('email')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span>Email</span>
        </button>
        <button class="field-tab" id="tabPassword" onclick="switchTab('password')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <span>Password</span>
        </button>
      </div>

      <!-- EMAIL PANEL -->
      <div class="field-panel active" id="panelEmail">
        <div class="current-chip" id="currentEmailChip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Current: <span id="currentEmailText">—</span>
        </div>
        <div class="field">
          <label class="field-label">New Email Address</label>
          <input type="email" class="field-input" id="editEmail" placeholder="Enter new email address">
        </div>
        <div class="field-hint" style="margin-top:-8px;margin-bottom:6px;">You'll be logged out if email is changed.</div>
      </div>

      <!-- PASSWORD PANEL -->
      <div class="field-panel" id="panelPassword">
        <div class="field">
          <label class="field-label">New Password</label>
          <input type="password" class="field-input" id="editPassword" placeholder="Enter new password">
        </div>

      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModalDirect()">Cancel</button>
        <button class="btn-save" id="btnSave" onclick="saveProfile()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/>
          </svg>
          Save Changes
        </button>
      </div>
      <div class="modal-msg" id="modalMsg"></div>
    </div>
  </div>
</div>

<!-- ── MAIN CARD ── -->
<div class="card">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo-mark">A</div>
    <div class="hdr-info">
      <div class="hdr-title">AMS</div>
      <div class="hdr-sub">Attendance Management System</div>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">--</div>
      <div>
        <div class="user-name" id="userName">Loading…</div>
        <div class="user-roll" id="userRoll">--</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
      Logout
    </button>
  </div>

  <!-- BODY -->
  <div class="body">
    <div class="page-title">Student Dashboard</div>
    <div class="page-sub">Student Portal</div>


    <!-- ACTION CARDS -->
    <div class="action-grid">

      <!-- View Attendance -->
      <div class="action-card" onclick="window.location.href='view-attendance.html'">
        <div class="action-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/>
          </svg>
        </div>
        <div class="action-title">View Attendance</div>
        <div class="action-desc">Browse your records</div>
      </div>

      <!-- Edit Profile -->
      <div class="action-card" onclick="openModal()">
        <div class="action-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="action-title">Edit Profile</div>
        <div class="action-desc">Update email &amp; password</div>
      </div>

      <!-- defaulter list -->
      <div class="action-card" onclick="window.location.href='defaulter-list.html'">
        <div class="action-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/>
          </svg>
        </div>
        <div class="action-title">Defaulter List</div>
        <div class="action-desc">Browse your records</div>
      </div>


    </div>
  </div>
</div>

<script>
  const API = "http://localhost:8080";
  let currentEmail = "";
  let activeTab    = "email";

  /* ══════════════════════════════════════
     AUTH GUARD — only logged-in students
  ══════════════════════════════════════ */
  (function authGuard(){
    const role  = localStorage.getItem("role");
    const email = localStorage.getItem("email");
    if(!role || !email || role !== "student"){
      alert("Access Denied. Please log in as a student.");
      window.location.href = "login.html";
    }
  })();

  /* ══════════════════════════════════════
     LOAD STUDENT DATA
  ══════════════════════════════════════ */
  async function loadStudent(){
    let email = localStorage.getItem("email");
    currentEmail = email;
    try {
      let res = await fetch(`${API}/profile?email=${encodeURIComponent(email)}`);
      if(!res.ok) throw new Error("API error");
      let user = await res.json();

      document.getElementById("userName").innerText = user.name;
      document.getElementById("userRoll").innerText = user.year + " — " + user.rollno;

      let initials = user.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
      document.getElementById("userAvatar").innerText = initials;

      // Store resolved email (from API)
      currentEmail = user.email || email;
      document.getElementById("currentEmailText").innerText = currentEmail;
      document.getElementById("editEmail").value = currentEmail;

      loadStats(user.rollno);
    } catch(err){
      console.error(err);
      document.getElementById("userName").innerText = "Student";
      document.getElementById("userAvatar").innerText = "S";
      currentEmail = email;
      document.getElementById("currentEmailText").innerText = currentEmail;
      document.getElementById("editEmail").value = currentEmail;
    }
  }

  /* ══════════════════════════════════════
     LOAD STATS
  ══════════════════════════════════════ */
  async function loadStats(rollno){
    try {
      let res  = await fetch(`${API}/attendance`);
      let data = await res.json();
      let mine = data.filter(a => a.rollno == rollno);
      document.getElementById("statPresent").innerText = mine.filter(a=>a.status==="Present").length;
      document.getElementById("statAbsent").innerText  = mine.filter(a=>a.status==="Absent").length;
      document.getElementById("statLate").innerText    = mine.filter(a=>a.status==="Late").length;
      document.getElementById("statLeave").innerText   = mine.filter(a=>a.status==="Leave").length;
    } catch(e){}
  }

  /* ══════════════════════════════════════
     TAB SWITCHER
  ══════════════════════════════════════ */
  function switchTab(tab){
    activeTab = tab;
    resetMsg();

    // Update tab buttons
    document.getElementById("tabEmail").classList.toggle("active", tab === "email");
    document.getElementById("tabPassword").classList.toggle("active", tab === "password");

    // Show/hide panels
    document.getElementById("panelEmail").classList.toggle("active", tab === "email");
    document.getElementById("panelPassword").classList.toggle("active", tab === "password");

    // Update modal subtitle
    document.getElementById("modalSubtitle").innerText =
      tab === "email" ? "Update your email address" : "Change your password";
  }

  /* ══════════════════════════════════════
     MODAL OPEN / CLOSE
  ══════════════════════════════════════ */
  function openModal(){
    // Extra guard: ensure still logged in when modal opens
    if(!localStorage.getItem("email") || localStorage.getItem("role") !== "student"){
      alert("Session expired. Please log in again.");
      window.location.href = "login.html";
      return;
    }
    switchTab("email");  // always start on email tab
    document.getElementById("editEmail").value = currentEmail;
    document.getElementById("editPassword").value    = "";
    document.getElementById("modalOverlay").classList.add("open");
    setSaving(false);
  }

  function closeModalDirect(){
    document.getElementById("modalOverlay").classList.remove("open");
    resetMsg();
  }

  function closeModal(e){
    if(e.target === document.getElementById("modalOverlay")) closeModalDirect();
  }

  /* ══════════════════════════════════════
     MESSAGES & BUTTON STATE
  ══════════════════════════════════════ */
  function resetMsg(){
    let m = document.getElementById("modalMsg");
    m.className = "modal-msg";
    m.innerText = "";
  }

  function showMsg(text, type){
    let m = document.getElementById("modalMsg");
    m.innerText = text;
    m.className = "modal-msg " + type;
  }

  function setSaving(saving){
    let btn = document.getElementById("btnSave");
    btn.disabled = saving;
    btn.innerHTML = saving
      ? `<span class="spinner"></span> Saving…`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
           <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
           <polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/>
         </svg> Save Changes`;
  }

  /* ══════════════════════════════════════
     SAVE PROFILE  (auth-guarded)
  ══════════════════════════════════════ */
  async function saveProfile(){
    // Re-check session before any API call
    if(!localStorage.getItem("email") || localStorage.getItem("role") !== "student"){
      showMsg("Session expired. Please log in again.", "error");
      setTimeout(() => { window.location.href = "login.html"; }, 1500);
      return;
    }

    resetMsg();

    /* ── EMAIL UPDATE ── */
    if(activeTab === "email"){
      let newEmail = document.getElementById("editEmail").value.trim();
      if(!newEmail){
        showMsg("Email address is required.", "error"); return;
      }
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){
        showMsg("Please enter a valid email address.", "error"); return;
      }
      if(newEmail === currentEmail){
        showMsg("This is already your current email.", "error"); return;
      }

      setSaving(true);
      try {
        let res = await fetch(`${API}/updateProfile`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ currentEmail: currentEmail, email: newEmail })
        });
        let text = await res.text();

        if(res.ok || text.toLowerCase().includes("success")){
          showMsg("Email updated successfully! Redirecting to login…", "success");
          localStorage.setItem("email", newEmail);
          currentEmail = newEmail;
          document.getElementById("currentEmailText").innerText = newEmail;
          // Email changed → force re-login for security
          setTimeout(() => {
            localStorage.clear();
            window.location.href = "login.html";
          }, 2200);
        } else {
          showMsg(text || "Update failed. Please try again.", "error");
          setSaving(false);
        }
      } catch(e){
        showMsg("Server error. Please try again.", "error");
        setSaving(false);
      }

    /* ── PASSWORD UPDATE ── */
    } else {
      let newPwd     = document.getElementById("editPassword").value.trim();


      if(!newPwd){
        showMsg("New password is required.", "error"); return;
      }

      setSaving(true);
      try {
        let res = await fetch(`${API}/updateProfile`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            currentEmail: currentEmail,
            password:     newPwd
          })
        });
        let text = await res.text();

        if(res.ok || text.toLowerCase().includes("success")){
          showMsg("Password updated successfully!", "success");
          document.getElementById("editPassword").value = "";
          setTimeout(() => closeModalDirect(), 2000);
        } else {
          showMsg(text || "Update failed. Check your current password.", "error");
        }
      } catch(e){
        showMsg("Server error. Please try again.", "error");
      }
      setSaving(false);
    }
  }

  /* ══════════════════════════════════════
     LOGOUT
  ══════════════════════════════════════ */
  function logout(){
    localStorage.clear();
    window.location.href = "login.html";
  }

  loadStudent();
</script>
